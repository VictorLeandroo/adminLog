services:
  postgres:
    image: postgres:16
    container_name: fiorino_tracker_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fiorino_user
      POSTGRES_PASSWORD: fiorino_pass
      POSTGRES_DB: fiorino_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: